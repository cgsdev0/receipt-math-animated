<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>receipt-math (OCaml + Core via js_of_ocaml)</title>
<style>
canvas {
  image-rendering: pixelated;
  border: 1px solid black;
  box-sizing: border-box;
}
* {
  margin: 0;
  padding: 0;
}

#content {
  max-width: 512px;
  display: flex;
  flex-direction: column;
  gap: 64px;
  margin-top: 32px;
}
  body {
    display: flex;
    justify-content: center;
    flex-direction: column;
    align-items: center;
  }
</style>
</head>
<body>
  <div id="loginDiv"></div>
  <div id="content"></div>
<script src="main.js"></script>
<script src="receipt_math.js"></script>
<script type="module">
  function nextFrame() {
    return new Promise(requestAnimationFrame);
  }
  setupLoginSection();
  for (let i = 0; i < 50; ++i) {
    const { c, e } = foo();
    const div = document.createElement('div');

    c.addEventListener('click', ev => {
      sendCanvasToPrinter(c, e);
    });
    div.appendChild(c);
    div.appendChild(c);
    content.appendChild(div);
    await nextFrame();
  }
</script>
</body>
</html>
