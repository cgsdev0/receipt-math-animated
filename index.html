<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>receipt-math (OCaml + Core via js_of_ocaml)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

* {
  margin: 0;
  padding: 0;
}

html {
  margin-top: 32px;
  margin-bottom: 32px;
}

img, canvas {
  max-width: 100%;
  height: auto;
  object-fit: contain;
  image-rendering: pixelated;
  border: 1px solid black;
  box-sizing: border-box;
}

.magic {
  width: 100%;
  max-width: 512px;
  position: relative;
  cursor: pointer;
}
.magic > *:nth-child(2) {
  opacity: 1.0;
  transition: opacity 1.0s;
  position: absolute;
  top: 0;
  left: 0;
}

.magic:hover > *:nth-child(2) {
  opacity: 0.0;
}

#content {
  display: flex;
  flex-direction: column;
  width: 100vw;
  max-width: 512px;
  gap: 64px;
  margin-top: 32px;
}

body {
  width: 100vw;
  display: flex;
  align-items: center;
  flex-direction: column;
}
</style>
</head>
<body>
  <div id="loginDiv"></div>
  <div id="content"></div>
<script src="main.js"></script>
<script src="receipt_math.js"></script>
<script type="module">
  function nextFrame() {
    return new Promise(requestAnimationFrame);
  }
  setupLoginSection();
  const p = window.location.hash === "#debug" ? ["X"] : [];
  const BATCH_SIZE = 5;
  const THRESHOLD = 0.7;

  function formatText(str) {
    return str.replace(/-?\d+\.\d+/g, match => {
      const [whole, decimals] = match.split('.');
      return `${whole}.${decimals.slice(0, 3)}`;
    });
  }

  async function generateBatch() {
    var observer = new IntersectionObserver(entries => {
      if (entries.some(entry => entry.isIntersecting)) {
        observer.disconnect();
        generateBatch();
      }
    });

    const scroll_triggers = [];
    for (let i = 0; i < BATCH_SIZE; ++i) {
      const { c, e, colored } = foo(p[i]);
      const text = formatText(e);
      const div = document.createElement('div');
      const magic = document.createElement('div');
      magic.classList.add("magic");
      const code = document.createElement('pre');
      code.innerText = text;

      magic.addEventListener('click', ev => {
        sendCanvasToPrinter(c, text);
      });
      const img_color = document.createElement('img');
      img_color.src = colored.toDataURL('image/png');
      div.appendChild(code);
      magic.appendChild(c);
      magic.appendChild(img_color);
      if (i >= Math.floor(BATCH_SIZE * THRESHOLD)) {
        scroll_triggers.push(magic);
  }
      div.appendChild(magic);
      content.appendChild(div);
      await nextFrame();
    }
    scroll_triggers.forEach(trigger => observer.observe(trigger));
  }
  generateBatch();
</script>
  </div>
</html>
