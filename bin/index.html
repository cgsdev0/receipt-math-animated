<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>receipt-math (OCaml + Core via js_of_ocaml)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

html {
  margin-top: 32px;
  margin-bottom: 32px;
}
canvas, img {
  image-rendering: pixelated;
  border: 1px solid black;
  box-sizing: border-box;
  position: absolute;
  top: 0;
  left: 0;
}

.magic {
  width: 512px;
  height: 512px;
  position: relative;
  transform: translate3d(0, 0, 0);
  cursor: pointer;
}
.magic > *:nth-child(2) {
  opacity: 1.0;
  transition: opacity 1.0s;
}

.magic:hover > *:nth-child(2) {
  opacity: 0.0;
}

* {
  margin: 0;
  padding: 0;
}

#content {
  display: flex;
  flex-direction: column;
  max-width: 512px;
  gap: 64px;
  margin-top: 32px;
}
  body {
    display: flex;
    justify-content: center;
    flex-direction: column;
    align-items: center;
  }
</style>
</head>
<body>
  <div id="loginDiv"></div>
  <div id="content"></div>
<script src="main.js"></script>
<script src="receipt_math.js"></script>
<script type="module">
  function nextFrame() {
    return new Promise(requestAnimationFrame);
  }
  setupLoginSection();
  const p = window.location.hash === "#debug" ? ["X"] : [];
  const BATCH_SIZE = 5;
  const THRESHOLD = 0.7;

  async function generateBatch() {
    console.log("new batch");
    var observer = new IntersectionObserver(entries => {
      if (entries.some(entry => entry.isIntersecting)) {
        if (observer.magicConsumed) return;
        Object.assign(observer, { magicConsumed: true });
        generateBatch();
      }
    });

    const scroll_triggers = [];
    for (let i = 0; i < BATCH_SIZE; ++i) {
      const { c, e, colored } = foo(p[i]);
      const div = document.createElement('div');
      const magic = document.createElement('div');
      magic.classList.add("magic");
      const code = document.createElement('pre');
      code.innerText = e;

      magic.addEventListener('click', ev => {
        sendCanvasToPrinter(c, e);
      });
      const img = document.createElement('img');
      img.src = colored.toDataURL('image/png');
      div.appendChild(code);
      magic.appendChild(c);
      magic.appendChild(colored);
      if (i >= Math.floor(BATCH_SIZE * THRESHOLD)) {
        scroll_triggers.push(magic);
      }
      div.appendChild(magic);
      content.appendChild(div);
      colored.replaceWith(img);
      await nextFrame();
    }
    scroll_triggers.forEach(trigger => observer.observe(trigger));
  }
  generateBatch();
</script>
</body>
</html>
