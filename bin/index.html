<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <title>receipt-math (OCaml + Core via js_of_ocaml)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    /* Reset margins and hide body scrollbars */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #000;
      overflow: hidden;
    }

    /* 1. Main Scroller Container */
    .tiktok-container {
      height: 100vh;
      width: 100vw;
      overflow-y: scroll;
      scroll-snap-type: y mandatory; /* Locks the scroll vertically */
      scrollbar-width: none; /* Hides scrollbar in Firefox */
      position: relative;
    }
    .tiktok-container::-webkit-scrollbar {
      display: none; /* Hides scrollbar in Chrome/Safari */
    }

    canvas {
      border: 1px solid #555;
      box-sizing: border-box;
    }
    /* 2. Individual Video Slides */
    .tiktok-slide {
      h3 {
        text-align: center;
      }
      height: 100vh;
      width: 100vw;
      scroll-snap-align: start;
      position: absolute; /* Stack them all on top of each other */
      left: 0;
      top: 0;
      transition: none; /* Never animate positions */
      display: flex;
      flex-direction: column;
      background-color: black;
      border-bottom: 1px solid #555;
      color: white;
      align-items: center;
      justify-content: space-around;
    }

    .slide-overlay p {
      font-size: 1rem;
      margin-top: 8px;
      opacity: 0.8;
    }
</style>
</head>

let index = 0;
let last = 0;
let offset = 0;

document.addEventListener("DOMContentLoaded", () => {
  const content = document.querySelector("#content");
  document.querySelectorAll(".tiktok-slide").forEach((slide, i) => {
  const canvas = slide.querySelector("canvas");
  const h3 = slide.querySelector("h3");
  const program = initCanvas(canvas, i);
  h3.innerText = program.title;
  });

  const slides = document.querySelectorAll(".tiktok-slide");
  slides.forEach((slide, i) => {
  slide.style.transform = `translateY(${window.innerHeight * i}px)`;
  });

  // 1. Configure the observer options
  const observerOptions = {
    root: document.querySelector(".tiktok-container"), // The scrolling element
    rootMargin: "0px",
    threshold: 0.6 // Trigger when 60% of the canvas slide is visible
  };

  // 2. Define the observer behavior
  const canvasObserver = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      const canvas = entry.target;

      if (entry.isIntersecting) {
        // Video is snapped into view -> Play it
        canvas.start();
        let next = (+canvas.id.replace("canvas", '')) - 1;
        if (next !== last) {
        if (last !== (offset + 1) % 3) {
          last = next;
        console.log("A", { next, last, offset });
window.location.hash = "#" + btoa(JSON.stringify(stack[offset ? offset + 1 : last]));
          return;
        }
        last = next;
        if (last === (2 + offset) % 3) {
          // move top slide down
          const topIndex = (offset % 3) + 1;
          console.log(`moving ${topIndex} down`);
          const slide = document.querySelector(`.slide-${topIndex}`);
          const c = slide.querySelector("canvas");
          c.destroy();
          const h3 = slide.querySelector("h3");
          const program = initCanvas(c, offset + 3);
          h3.innerText = program.title;
          slide.style.transform = `translateY(${(offset + 3) * window.innerHeight}px)`;
          offset += 1;
        } else if (offset > 0) {
          // move bottom slide up
          const botIndex = ((2 + offset) % 3) + 1;
          console.log(`moving ${botIndex} up`);
          const slide = document.querySelector(`.slide-${botIndex}`);
          const c = slide.querySelector("canvas");
          c.destroy();
          const h3 = slide.querySelector("h3");
          const program = initCanvas(c, offset - 1);
          h3.innerText = program.title;
          slide.style.transform = `translateY(${(offset - 1) * window.innerHeight}px)`;
          offset -= 1;
        }

        }
        console.log("B", { next, last, offset });
window.location.hash = "#" + btoa(JSON.stringify(stack[offset ? offset + 1 : last]));
        } else {
        // Video scrolled out of view -> Pause and reset to start
        canvas.end();
      }
    });
  }, observerOptions);

  // 3. Attach the observer to each canvas element
  document.querySelectorAll("canvas").forEach((canvas) => {
    canvasObserver.observe(canvas);
  });
  const container = document.querySelector(".tiktok-container");
});
